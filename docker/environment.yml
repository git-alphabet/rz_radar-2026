name: rz_radar-2026
channels:
  - conda-forge
  - nvidia
  - defaults

dependencies:
  - python=3.9
  - pip=25.2

  # ── CUDA 11.7.1（conda-forge 安装，torch/tensorrt 兼容）
  - cuda=11.7.1
  # ── cuDNN 8.9（TensorRT 8.6.0 需要，conda-forge 管理）
  - cudnn=8.9.1.23

  # ── PyQt6 运行时必须的 XCB/X11 库（pip 装不了，conda 管理）──
  - xcb-util-image
  - xcb-util-keysyms
  - xcb-util-renderutil
  - xcb-util-wm
  - xcb-util-cursor
  - libxkbcommon

  # ── pip（纯 Python + torch + tensorrt）────────────────────────
  - pip:
    # torch 1.13.1 会自动安装 nvidia-cuda-runtime-cu11 / nvidia-cudnn-cu11 等
    - torch==1.13.1
    - torchvision==0.14.1
    - asttokens==3.0.1
    - backcall==0.2.0
    - charset-normalizer==2.0.12
    - click==8.1.8
    - coloredlogs==15.0.1
    - cycler==0.12.1
    - decorator==5.2.1
