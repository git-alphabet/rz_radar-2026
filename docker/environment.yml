    - humanfriendly==10.0
    - idna==3.11
    - importlib-metadata==8.7.1
    - ipython==8.4.0
    - itsdangerous==2.2.0
    - jedi==0.19.2
    - jinja2==3.1.6
    - kiwisolver==1.4.7
    - markupsafe==3.0.3
    - matplotlib==3.5.2
    - matplotlib-inline==0.2.1
    - mpmath==1.3.0
    - numpy==1.24.4
    - onnx==1.16.1
    - onnxruntime==1.14.1
    - opencv-python==4.5.5.64
    - packaging==26.0
    - pandas==1.1.5
    - parso==0.8.6
    - pexpect==4.9.0
