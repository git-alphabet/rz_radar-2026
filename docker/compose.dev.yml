# compose.dev.yml — 开发环境（standalone，无需叠加其他文件）
# 用法（项目根目录执行）:
#   docker compose -f docker/compose.dev.yml up -d
#   仅构建:   docker compose -f docker/compose.dev.yml build
#   进入容器: docker compose -f docker/compose.dev.yml exec radar bash
#   非 root 跑脚本: docker compose -f docker/compose.dev.yml --profile user run --rm radar_user python xxx.py
#   手动跑:   python main.py

services:
  radar:
    image: alphabet2006/rz-radar-2026:latest
    env_file:
      - ../.env
    user: "0:0"
    group_add:
      - "0"  # 让非 root 用户可访问 /dev/bus/usb 下 root:root 的 0664 设备节点

    network_mode: host

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      DISPLAY: ${DISPLAY:-:0}
      MVCAM_COMMON_RUNENV: /opt/MVS/lib
      LD_LIBRARY_PATH: /workspace/TensorRT-8.6.0.12/lib:/opt/MVS/bin:/opt/MVS/lib:/opt/MVS/lib/x86_64:/opt/MVS/lib/64
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONUNBUFFERED: "1"
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
      USBFS_MEMORY_MB: ${USBFS_MEMORY_MB:-2000}

    volumes:
      - ..:/workspace:cached           # 宿主机代码实时同步
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  # PyQt6 / OpenCV 图形显示
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    devices:
      - /dev/bus/usb

    privileged: true                   # 海康 SDK 需要直接访问 USB 设备节点

    working_dir: /workspace
    entrypoint:
      - /bin/bash
      - /workspace/docker/dev-entrypoint.sh
    command:
      - /bin/bash
      - -lc
      - sleep infinity

    stdin_open: true
    tty: true

  radar_user:
    image: alphabet2006/rz-radar-2026:latest
    env_file:
      - ../.env
    profiles:
      - user
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    group_add:
      - "0"

    network_mode: host

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      DISPLAY: ${DISPLAY:-:0}
      MVCAM_COMMON_RUNENV: /opt/MVS/lib
      LD_LIBRARY_PATH: /workspace/TensorRT-8.6.0.12/lib:/opt/MVS/bin:/opt/MVS/lib:/opt/MVS/lib/x86_64:/opt/MVS/lib/64
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONUNBUFFERED: "1"
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
      USBFS_MEMORY_MB: ${USBFS_MEMORY_MB:-2000}

    volumes:
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    devices:
      - /dev/bus/usb

    privileged: true

    working_dir: /workspace
    entrypoint:
      - /bin/bash
      - /workspace/docker/dev-entrypoint.sh
    command:
      - /bin/bash
      - -lc
      - sleep infinity

    stdin_open: true
    tty: true
