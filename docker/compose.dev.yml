# compose.dev.yml — 开发环境（standalone，无需叠加其他文件）
# 用法（项目根目录执行）:
#   docker compose --project-directory . -f docker/compose.dev.yml up -d
#   仅构建:   docker compose --project-directory . -f docker/compose.dev.yml build
#   进入容器: docker compose --project-directory . -f docker/compose.dev.yml exec radar bash
#   手动跑:   python main.py

services:
  radar:
    image: alphabet2006/rz-radar-2026:latest
    env_file:
      - ../.env
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"

    network_mode: host

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      DISPLAY: ${DISPLAY:-:0}
      MVCAM_COMMON_RUNENV: /opt/MVS/lib
      LD_LIBRARY_PATH: /workspace/TensorRT-8.6.0.12/lib:/opt/MVS/lib:/opt/MVS/lib/x86_64
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONUNBUFFERED: "1"

    volumes:
      - ..:/workspace:cached           # 宿主机代码实时同步
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  # PyQt6 / OpenCV 图形显示
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    devices:
      - /dev/bus/usb

    privileged: true                   # 海康 SDK 需要直接访问 USB 设备节点

    working_dir: /workspace
    command: >
      bash -c "if [ -w /sys/module/usbcore/parameters/usbfs_memory_mb ]; then
      echo 2000 > /sys/module/usbcore/parameters/usbfs_memory_mb; fi
      && sleep infinity"

    stdin_open: true
    tty: true
