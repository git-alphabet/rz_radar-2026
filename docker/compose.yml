# compose.yml — 生产/基础配置
# 用法（均在项目根目录执行）:
#   run prod:  docker compose --project-directory . -f docker/compose.yml up
#   run dev:   docker compose --project-directory . -f docker/compose.yml -f docker/compose.dev.yml up
#   build:     docker compose --project-directory . -f docker/compose.yml -f docker/compose.build.yml build

services:
  radar:
    image: ${DOCKER_HUB_USER}/${IMAGE_NAME}:${IMAGE_TAG:-latest}

    # ── 相机网络 ──────────────────────────────────────────────
    # GigE Vision 相机通过 UDP 广播发现设备，必须使用宿主机网络
    # 如果不用海康相机（camera_mode: test | video）可改为 bridge
    network_mode: host

    # ── GPU ──────────────────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # ── 环境变量 ─────────────────────────────────────────────
    environment:
      DISPLAY: ${DISPLAY:-:0}
      MVCAM_COMMON_RUNENV: /opt/MVS/lib
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    # ── 挂载 ─────────────────────────────────────────────────
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw   # PyQt6 显示

    # ── 串口（可根据实际设备路径修改 .env 中 SERIAL_PORT）────
    devices:
      - ${SERIAL_PORT:-/dev/ttyUSB0}:${SERIAL_PORT:-/dev/ttyUSB0}
